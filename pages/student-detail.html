<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết học sinh — Nhật ký can thiệp</title>
<link rel="stylesheet" href="../shared/styles.css">
<link rel="stylesheet" href="../shared/components.css">
</head>
<body>
<div class="app-shell">
  <div data-component="sidebar" data-active="students"></div>

  <div class="main-content">
    <div data-component="topbar" data-title="Chi tiết học sinh"></div>
    <div class="page student-detail-page" id="pageStudentDetail"></div>
  </div>

  <div data-component="bottom-nav" data-active="students"></div>
  <div data-component="student-modal"></div>
</div>

<script src="../components/components-loader.js" type="module"></script>

<script type="module">
import {
  Store,
  avatarColor,
  initials,
  age,
  fmtDate,
  fmtDateShort,
  fmtMoney,
  statusLabel,
  getWeekRange,
  todayStr,
} from '../shared/store.js';

const DAYS_SHORT = ['CN','T2','T3','T4','T5','T6','T7'];
const page = document.getElementById('pageStudentDetail');
const params = new URLSearchParams(location.search);
let studentId = params.get('id');
let weekOffset = 0;
let monthOffset = 0;

function fmtDatePlain(value) {
  if (!value) return '';
  const parts = String(value).split('-');
  if (parts.length === 3) {
    const [year, month, day] = parts;
    return `${day.padStart(2, '0')}/${month.padStart(2, '0')}/${year}`;
  }
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return String(value);
  return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
}

function render() {
  const students = Store.get('students');
  const st = students.find(s => s.id === studentId) || students[0];
  if (!st) {
    page.innerHTML = `
      <div class="page-header">
        <div>
          <div class="page-title">Chi tiết học sinh</div>
          <div class="page-sub">Chưa có học sinh nào</div>
        </div>
        <a class="btn btn-outline " href="students.html">← Quay lại</a>
      </div>`;
    return;
  }
  studentId = st.id;

  const sessions = Store.get('sessions').filter(s => s.studentId === st.id);
  const learnedToDate = learnedSlotsToDate(sessions, st);
  const debts = Store.get('debts').filter(d => d.studentId === st.id && !d.done);
  const week = getWeekRange(weekOffset);
  const month = getMonthRange(monthOffset);
  const weekSessions = sessionsInRange(sessions, week.start, week.end);
  const monthSessions = sessionsInRange(sessions, month.start, month.end);
  const weekReport = Store.getReport({ studentId: st.id, type: 'week', periodStart: week.start, periodEnd: week.end });
  const monthReport = Store.getReport({ studentId: st.id, type: 'month', periodStart: month.start, periodEnd: month.end });
  const weekReportsInMonth = reportsInRange(Store.get('reports') || [], st.id, 'week', month.start, month.end);

  page.innerHTML = `
    <section class="student-profile-card">
      <div class="student-profile-main">
        <div class="avatar lg" style="background:${avatarColor(st.name)}">${initials(st.name)}</div>
        <div class="student-profile-info">
          <div class="student-profile-title-row">
            <div class="student-profile-title-main">
              <h1>${escapeHTML(st.name)}</h1>
              <div class="student-profile-tags">
                ${(st.difficulties || []).map(d => `<span class="tag">${escapeHTML(d)}</span>`).join('')}
                ${st.dob ? `<span class="tag green">${age(st.dob)}</span>` : ''}
                ${debts.length ? `<span class="tag red">Nợ ${sum(debts, 'slots')} ca</span>` : ''}
              </div>
            </div>
            <button class="btn btn-outline student-profile-edit-btn" id="btnEditStudent">Sửa thông tin</button>
          </div>
          ${st.goal ? `<p><span class="emoji" aria-hidden="true">🎯</span>${escapeHTML(st.goal)}</p>` : ''}
        </div>
      </div>
      <div class="student-profile-grid">
        <div><span>Ngày bắt đầu học</span><strong>${st.startDate ? fmtDatePlain(st.startDate) : 'Chưa nhập'}</strong></div>
        <div><span>Đã học</span><strong>${formatNumber(learnedToDate)} ca</strong></div>
        <div><span>Giờ học</span><strong>${escapeHTML(st.schedTime || '--:--')}</strong></div>
        <div><span>Lịch tuần</span><strong>${formatDays(st)}</strong></div>
        <div><span>Độ dài</span><strong>${st.duration || 1} ca</strong></div>
        <div><span>Học phí</span><strong>${fmtMoney(st.feePerSlot)}/ca</strong></div>
        <div><span>Tên bố</span><strong>${escapeHTML(st.fatherName || 'Chưa nhập')}</strong></div>
        <div><span>Tên mẹ</span><strong>${escapeHTML(st.motherName || 'Chưa nhập')}</strong></div>
      </div>
    </section>

    <section class="detail-report-card">
      <div class="detail-section-head">
        <div>
          <div class="section-label">Nhận xét theo tuần</div>
          <h2>Tuần ${week.label}</h2>
        </div>
        <div class="detail-actions">
          <button class="icon-btn" data-action="prev-week" aria-label="Tuần trước">‹</button>
          <button class="icon-btn" data-action="next-week" aria-label="Tuần sau">›</button>
          <button class="btn btn-primary" data-action="export-week"><span class="emoji" aria-hidden="true">📄</span> Xuất tuần</button>
        </div>
      </div>
      ${summaryTemplate({ st, sessions: weekSessions, report: weekReport, mode: 'week', label: `Tuần ${week.label}` })}
      ${sessionListTemplate(weekSessions)}
    </section>

    <section class="detail-report-card">
      <div class="detail-section-head">
        <div>
          <div class="section-label">Nhận xét theo tháng</div>
          <h2>${month.label}</h2>
        </div>
        <div class="detail-actions">
          <button class="icon-btn" data-action="prev-month" aria-label="Tháng trước">‹</button>
          <button class="icon-btn" data-action="next-month" aria-label="Tháng sau">›</button>
          <button class="btn btn-primary" data-action="export-month"><span class="emoji" aria-hidden="true">📄</span> Xuất tháng</button>
        </div>
      </div>
      ${summaryTemplate({ st, sessions: monthSessions, report: monthReport, mode: 'month', label: month.label, weekReports: weekReportsInMonth })}
      ${weekReportListTemplate(weekReportsInMonth)}
    </section>
  `;

  bindEvents({ st, week, month, weekSessions, monthSessions, weekReport, monthReport, weekReportsInMonth });
}

function bindEvents(ctx) {
  const { st, week, month, weekSessions, monthSessions, weekReportsInMonth } = ctx;
  document.getElementById('btnEditStudent')?.addEventListener('click', () => window.StudentModal?.open(st.id));

  page.querySelector('[data-action="prev-week"]')?.addEventListener('click', () => { weekOffset -= 1; render(); });
  page.querySelector('[data-action="next-week"]')?.addEventListener('click', () => { weekOffset += 1; render(); });
  page.querySelector('[data-action="prev-month"]')?.addEventListener('click', () => { monthOffset -= 1; render(); });
  page.querySelector('[data-action="next-month"]')?.addEventListener('click', () => { monthOffset += 1; render(); });

  page.querySelector('[data-action="ai-week"]')?.addEventListener('click', () => {
    const field = page.querySelector('[data-report-content="week"]');
    const text = generateWeekSummary(st, weekSessions, `Tuần ${week.label}`, field?.value || '');
    field.value = text;
    field.focus();
  });
  page.querySelector('[data-action="ai-month"]')?.addEventListener('click', () => {
    const field = page.querySelector('[data-report-content="month"]');
    const text = generateMonthSummary(st, monthSessions, weekReportsInMonth, month.label, field?.value || '');
    field.value = text;
    field.focus();
  });
  page.querySelector('[data-action="save-week-report"]')?.addEventListener('click', () => {
    saveReport(st, 'week', week.start, week.end, `Tuần ${week.label}`, valueOfReport('week'));
  });
  page.querySelector('[data-action="save-month-report"]')?.addEventListener('click', () => {
    saveReport(st, 'month', month.start, month.end, month.label, valueOfReport('month'));
  });
  page.querySelector('[data-action="export-week"]')?.addEventListener('click', () => {
    const content = valueOfReport('week') || generateWeekSummary(st, weekSessions, `Tuần ${week.label}`);
    exportWordReport(st, weekSessions, `Tuần ${week.label}`, 'tuan', content);
  });
  page.querySelector('[data-action="export-month"]')?.addEventListener('click', () => {
    const content = valueOfReport('month') || generateMonthSummary(st, monthSessions, weekReportsInMonth, month.label);
    exportWordReport(st, monthSessions, month.label, 'thang', content, weekReportsInMonth);
  });

  bindSessionNoteToggles();
}

function summaryTemplate({ st, sessions, report, mode, label, weekReports = [] }) {
  const taught = sessions.filter(s => s.status === 'taught' || s.status === 'partial' || s.status === 'makeup' || s.type === 'makeup');
  const absent = sessions.filter(s => s.status === 'absent');
  const busy = sessions.filter(s => s.status === 'busy');
  const slots = taught.reduce((a, s) => a + actualSlots(s), 0);
  const absentSlots = absent.reduce((a, s) => a + plannedSlots(s), 0);
  const busySlots = busy.reduce((a, s) => a + plannedSlots(s), 0);
  const noStudySlots = absentSlots + busySlots;
  const makeupNeededSlots = remainingMakeupSlots(st.id, sessions);
  const hasSource = mode === 'week' ? hasSessionNotes(sessions) : (weekReports.length || hasSessionNotes(sessions));
  const draft = report?.content || '';

  return `
    <div class="student-summary-grid">
      <div><strong>${formatNumber(slots)}</strong><span>Ca đã học</span></div>
      <div><strong>${formatNumber(noStudySlots)}</strong><span>Không học</span></div>
      <div><strong>${formatNumber(makeupNeededSlots)}</strong><span>Ca cần bù</span></div>
    </div>

    <div class="ai-summary-card">
      <div class="ai-summary-head">
        <div class="summary-note-title"><span class="emoji" aria-hidden="true">✨</span> Nhận xét ${mode === 'week' ? 'tuần' : 'tháng'} gửi phụ huynh</div>
      </div>
      <textarea class="ai-summary-textarea" data-report-content="${mode}" rows="7" placeholder="Nhập vài từ khóa để AI tạo nhận xét, ví dụ: Tiến bộ, hợp tác hơn, phát âm được dấu hỏi/dấu ngã...">${escapeHTML(draft)}</textarea>
      <div class="ai-summary-actions">
        <button class="btn btn-outline" data-action="ai-${mode}"><span class="emoji" aria-hidden="true">🤖</span> AI tạo nhận xét</button>
        <button class="btn btn-primary" data-action="save-${mode}-report">Lưu nhận xét</button>
      </div>
    </div>`;
}

function sessionListTemplate(sessions) {
  if (!sessions.length) {
    return `<div class="empty-detail-note">Chưa có ca học nào trong tuần này.</div>`;
  }

  const firstEmptyNoteIndex = sessions.findIndex(s => !shouldHideSessionNote(s.status || 'pending') && !sessionNoteText(s));
  const firstExpandableIndex = firstEmptyNoteIndex >= 0
    ? firstEmptyNoteIndex
    : sessions.findIndex(s => !shouldHideSessionNote(s.status || 'pending'));

  return `
    <div class="session-note-list">
      ${sessions.map((s, index) => {
        const note = sessionNoteText(s);
        const status = s.status || 'pending';
        const statusText = statusLabel(status) || 'Chưa chấm';
        const hideNote = shouldHideSessionNote(status);
        const isOpen = !hideNote && index === firstExpandableIndex;
        const noteHref = `session-note.html?studentId=${encodeURIComponent(s.studentId || studentId)}&sessionId=${encodeURIComponent(s.id)}`;
        const noteBody = hideNote ? '' : (note ? `
          <div class="session-note-content" ${isOpen ? '' : 'hidden'}>
            <div class="session-note-plain">
              <span>${escapeHTML(note)}</span>
            </div>
          </div>` : `
          <div class="session-note-content" ${isOpen ? '' : 'hidden'}>
            <div class="session-note-plain is-empty">
              <div class="session-note-empty-state">
                <div class="session-note-empty-icon"><span class="emoji" aria-hidden="true">💬</span></div>
                <div class="session-note-empty-text">Chưa có nhận xét cho buổi học này.</div>
                <a class="session-note-add-btn" href="${noteHref}">Thêm nhận xét</a>
              </div>
            </div>
          </div>`);

        return `
        <article class="session-note-item${hideNote ? ' no-note' : ''}${isOpen ? ' is-open' : ''}" data-session-note-item="${escapeHTML(s.id || '')}">
          <div class="session-note-head">
            <div class="session-note-head-main">
              <strong>${fmtDate(s.date)}</strong>
              <span>${escapeHTML(s.startTime || '--:--')} · ${s.duration || 1} ca · ${statusText}</span>
            </div>
            <div class="session-note-status-wrap">
              <span class="status-pill status-${status}">${statusText}</span>
              ${hideNote ? '' : `
              <button class="session-note-toggle" type="button" data-session-toggle aria-label="Mở rộng hoặc thu gọn nhận xét" aria-expanded="${isOpen ? 'true' : 'false'}">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>`}
            </div>
          </div>
          ${noteBody}
        </article>`;
      }).join('')}
    </div>`;
}

function shouldHideSessionNote(status) {
  return status === 'absent' || status === 'busy';
}

function bindSessionNoteToggles() {
  page.querySelectorAll('[data-session-toggle]').forEach(button => {
    button.addEventListener('click', () => {
      const item = button.closest('[data-session-note-item]');
      const body = item?.querySelector('.session-note-content');
      if (!item || !body) return;

      const isOpen = item.classList.toggle('is-open');
      body.hidden = !isOpen;
      button.setAttribute('aria-expanded', String(isOpen));
    });
  });
}

function weekReportListTemplate(reports) {
  if (!reports.length) {
    return `<div class="empty-detail-note">Chưa có nhận xét tuần đã lưu trong tháng này.</div>`;
  }
  return `
    <div class="week-report-list">
      <div class="section-label">Nguồn nhận xét tuần</div>
      ${reports.map(r => `
        <article class="week-report-item">
          <strong>${escapeHTML(r.label || 'Nhận xét tuần')}</strong>
          <p>${escapeHTML(r.content || '')}</p>
        </article>`).join('')}
    </div>`;
}

function sessionNoteText(session) {
  const direct = String(session.noteText || session.note || session.noteContent || '').trim();
  if (direct) return direct;
  return [session.noteSkill, session.noteBehavior, session.noteProgress, session.noteParent]
    .map(v => String(v || '').trim())
    .filter(Boolean)
    .join('\n');
}

function saveReport(st, type, start, end, label, content) {
  Store.upsertReport({
    studentId: st.id,
    type,
    periodStart: start,
    periodEnd: end,
    label,
    source: 'teacher-edited',
    content: content.trim(),
  });
}

function valueOfReport(mode) {
  return page.querySelector(`[data-report-content="${mode}"]`)?.value.trim() || '';
}

function generateWeekSummary(st, sessions, label, teacherInput = '') {
  const taught = sessions.filter(s => isAttendedSession(s));
  const notes = collectNotes(sessions);
  const keywords = parseTeacherKeywords(teacherInput);
  const signals = analyzeParentNoteSignals([...notes, teacherInput].join(' '));
  const totalSlots = taught.reduce((a, s) => a + actualSlots(s), 0);
  const parts = [];

  parts.push(`${label}, ${st.name} đã tham gia ${formatNumber(taught.length)} buổi học với tổng ${formatNumber(totalSlots)} ca.`);

  if (signals.hasProgress) {
    parts.push(`${st.name} có một số tiến bộ tích cực so với những buổi trước. Bé bắt đầu chủ động hơn trong hoạt động học và có những thời điểm hợp tác tốt hơn với cô.`);
  } else if (notes.length || keywords.length) {
    parts.push(`Trong tuần này, bé tiếp tục được cô theo dõi và hỗ trợ trong các hoạt động can thiệp hằng buổi.`);
  } else {
    parts.push(`Trong tuần này, bé đang tiếp tục duy trì nề nếp học tập và làm quen với các hoạt động cùng cô.`);
  }

  if (signals.hasPronunciation) {
    const pronunciationDetail = buildPronunciationDetail(keywords.join(', ') || teacherInput || notes.join(' '));
    parts.push(`Về ngôn ngữ, bé đã có tín hiệu tốt khi luyện phát âm${pronunciationDetail}. Bé vẫn cần được luyện thêm để phát âm rõ và ổn định hơn.`);
  }

  if (signals.hasCooperation) {
    parts.push(`Khả năng hợp tác của bé có cải thiện: bé biết lắng nghe hơn và có thể làm theo hướng dẫn khi được cô nhắc nhẹ nhàng, từng bước.`);
  }

  if (signals.hasAttention) {
    parts.push(`Khả năng chú ý và tập trung của bé có chuyển biến tốt hơn ở một số hoạt động, tuy nhiên vẫn cần tiếp tục rèn để duy trì ổn định.`);
  }

  if (signals.hasBehaviorIssue) {
    parts.push(`Bên cạnh đó, bé đôi lúc vẫn còn hiếu động, bướng hoặc chưa hợp tác ngay khi bắt đầu hoạt động, nên cô vẫn cần nhắc lại và hỗ trợ để bé quay lại nhiệm vụ.`);
  }

  if (signals.hasCommunication) {
    parts.push(`Về giao tiếp, bé có thêm tín hiệu tích cực trong việc phản hồi và tương tác với cô, cần tiếp tục khuyến khích để bé tự tin hơn.`);
  }

  if (signals.hasSelfCare) {
    parts.push(`Ở nhóm kỹ năng tự lập, bé đã có cơ hội luyện thêm các thao tác theo hướng dẫn và cần tiếp tục thực hành đều đặn để hình thành thói quen.`);
  }

  if (keywords.length && !signals.hasPronunciation && !signals.hasCooperation && !signals.hasAttention && !signals.hasBehaviorIssue && !signals.hasCommunication && !signals.hasSelfCare) {
    parts.push(`Các điểm cô ghi nhận thêm trong tuần gồm: ${formatKeywordList(keywords)}. Đây là những nội dung cô sẽ tiếp tục quan sát và củng cố trong các buổi tới.`);
  }

  parts.push(`Tuần tới, cô sẽ tiếp tục duy trì những điểm bé đang có tiến bộ, đồng thời rèn thêm khả năng hợp tác, tập trung và điều chỉnh hành vi để bé ổn định hơn trong từng hoạt động.`);

  return normalizeSummary(parts).join('\n\n');
}

function generateMonthSummary(st, sessions, weekReports, label, teacherInput = '') {
  const taught = sessions.filter(s => isAttendedSession(s));
  const sourceTexts = weekReports.map(r => r.content).filter(Boolean);
  const notes = collectNotes(sessions);
  const keywords = parseTeacherKeywords(teacherInput);
  const signals = analyzeParentNoteSignals([...sourceTexts, ...notes, teacherInput].join(' '));
  const totalSlots = taught.reduce((a, s) => a + actualSlots(s), 0);
  const parts = [];

  parts.push(`Trong ${label.toLowerCase()}, ${st.name} đã tham gia ${formatNumber(taught.length)} buổi học với tổng ${formatNumber(totalSlots)} ca.`);

  if (sourceTexts.length) {
    parts.push(`Dựa trên các nhận xét theo tuần, bé có sự thay đổi qua từng giai đoạn trong tháng. Cô ghi nhận bé đang dần làm quen và đáp ứng tốt hơn với một số hoạt động can thiệp.`);
  } else if (notes.length || keywords.length) {
    parts.push(`Qua các buổi học trong tháng, cô đã ghi nhận thêm một số biểu hiện và khả năng của bé để tiếp tục điều chỉnh mục tiêu hỗ trợ phù hợp.`);
  } else {
    parts.push(`Trong tháng này, bé tiếp tục duy trì quá trình học và được cô theo dõi ở các nhóm kỹ năng chính.`);
  }

  if (signals.hasProgress) {
    parts.push(`Điểm tích cực là bé đã có tiến bộ ở một số thời điểm, biết hợp tác hơn và có tín hiệu tiếp thu tốt hơn so với giai đoạn đầu.`);
  }
  if (signals.hasPronunciation) {
    const pronunciationDetail = buildPronunciationDetail(keywords.join(', ') || teacherInput || [...sourceTexts, ...notes].join(' '));
    parts.push(`Về ngôn ngữ, bé có tín hiệu tốt khi luyện phát âm${pronunciationDetail}, tuy nhiên vẫn cần luyện lặp lại để rõ và ổn định hơn.`);
  }
  if (signals.hasBehaviorIssue) {
    parts.push(`Bé vẫn còn những lúc hiếu động, bướng hoặc chưa hợp tác ổn định, vì vậy cô sẽ tiếp tục rèn nề nếp, khả năng chờ đợi và làm theo hướng dẫn.`);
  }
  if (keywords.length && !signals.hasProgress && !signals.hasPronunciation && !signals.hasBehaviorIssue) {
    parts.push(`Các nội dung cô ghi nhận thêm gồm: ${formatKeywordList(keywords)}.`);
  }

  parts.push(`Trong tháng tới, cô sẽ tiếp tục duy trì các điểm mạnh đã hình thành, tăng dần yêu cầu theo khả năng của bé và phối hợp với gia đình để hỗ trợ bé ổn định hơn trong học tập, giao tiếp và sinh hoạt.`);

  return normalizeSummary(parts).join('\n\n');
}

function isAttendedSession(session) {
  return session.status === 'taught' || session.status === 'partial' || session.status === 'makeup' || session.type === 'makeup';
}

function parseTeacherKeywords(input = '') {
  return [...new Set(String(input || '')
    .split(/[;,\n•]+/)
    .map(item => item.trim())
    .filter(item => item && item.length <= 80))];
}

function analyzeParentNoteSignals(text = '') {
  const lower = normalizeVietnamese(text);
  return {
    hasProgress: hasAny(lower, ['tien bo', 'tot hon', 'kha hon', 'co tien bo', 'on dinh hon', 'lam duoc', 'biet', 'co tin hieu tot']),
    hasPronunciation: hasAny(lower, ['phat am', 'dau hoi', 'dau nga', 'noi', 'am', 'ngu am', 'bat chuoc am', 'nhai lai']),
    hasCooperation: hasAny(lower, ['hop tac', 'nghe loi', 'vang loi', 'lam theo', 'phoi hop', 'ngoan hon']),
    hasAttention: hasAny(lower, ['tap trung', 'chu y', 'ngoi lau hon', 'duy tri', 'chu dong nhin']),
    hasBehaviorIssue: hasAny(lower, ['buong', 'nghich', 'chua hop tac', 'khong hop tac', 'hieu dong', 'an va', 'khoc', 'chong doi', 'mat tap trung']),
    hasCommunication: hasAny(lower, ['giao tiep', 'tuong tac', 'phan hoi', 'goi ten', 'nhin mat', 'yeu cau', 'tra loi']),
    hasSelfCare: hasAny(lower, ['tu lap', 'tu phuc vu', 'di ve sinh', 'an', 'mac ao', 'di giay', 'rua tay'])
  };
}

function normalizeVietnamese(text = '') {
  return String(text || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/đ/g, 'd');
}

function hasAny(text, words) {
  return words.some(word => text.includes(word));
}

function buildPronunciationDetail(text = '') {
  const lower = normalizeVietnamese(text);
  const details = [];
  if (lower.includes('dau hoi')) details.push('dấu hỏi');
  if (lower.includes('dau nga')) details.push('dấu ngã');
  if (!details.length) return '';
  return `, đặc biệt với các tiếng có ${details.join(' và ')}`;
}

function formatKeywordList(items = []) {
  if (!items.length) return '';
  if (items.length === 1) return items[0];
  return `${items.slice(0, -1).join(', ')} và ${items[items.length - 1]}`;
}

function normalizeSummary(parts = []) {
  return parts
    .map(part => String(part || '').replace(/\s+/g, ' ').trim())
    .filter(Boolean);
}

function collectNotes(sessions) {
  return [...new Set(sessions.map(sessionNoteText).map(t => t.trim()).filter(Boolean))];
}

function hasSessionNotes(sessions) {
  return sessions.some(s => sessionNoteText(s));
}

function joinNotes(items) {
  return items.map(t => t.replace(/[.。]+$/,'')).join('; ');
}

function reportsInRange(reports, studentId, type, start, end) {
  return reports
    .filter(r => r.studentId === studentId && r.type === type && r.periodStart >= start && r.periodStart <= end)
    .sort((a, b) => a.periodStart.localeCompare(b.periodStart));
}

function exportWordReport(st, sessions, label, scope, summaryContent = '', weekReports = []) {
  const taught = sessions.filter(s => s.status === 'taught' || s.status === 'partial' || s.status === 'makeup' || s.type === 'makeup');
  const slots = taught.reduce((a, s) => a + actualSlots(s), 0);
  const absentBusySlots = sessions
    .filter(s => s.status === 'absent' || s.status === 'busy')
    .reduce((a, s) => a + plannedSlots(s), 0);
  const fileName = safeFileName(`bao-cao-${scope}-${st.name}-${todayStr()}.doc`);

  const html = `
    <html><head><meta charset="UTF-8"><title>Báo cáo ${label}</title>
    <style>
      body{font-family:Arial,sans-serif;color:#111827;line-height:1.5}
      h1{font-size:22px;margin:0 0 6px} h2{font-size:16px;margin:20px 0 8px}
      .muted{color:#6b7280}.box{border:1px solid #e5e7eb;padding:12px;margin:12px 0;border-radius:8px}
      table{width:100%;border-collapse:collapse;margin-top:10px} th,td{border:1px solid #e5e7eb;padding:8px;text-align:left;vertical-align:top;font-size:12px}
      th{background:#f3f4f6} p{white-space:pre-line}.small{font-size:12px;color:#6b7280}
    </style></head><body>
      <h1>Báo cáo can thiệp — ${escapeHTML(st.name)}</h1>
      <div class="muted">${escapeHTML(label)} · Tạo ngày ${fmtDate(todayStr())}</div>
      <div class="box">
        <strong>Thông tin học sinh</strong><br>
        Tên bố: ${escapeHTML(st.fatherName || 'Chưa nhập')}<br>
        Tên mẹ: ${escapeHTML(st.motherName || 'Chưa nhập')}<br>
        Ngày bắt đầu học: ${st.startDate ? fmtDate(st.startDate) : 'Chưa nhập'}<br>
        Đã học: ${formatNumber(learnedSlotsToDate(sessions, st))} ca<br>
        Mục tiêu: ${escapeHTML(st.goal || 'Chưa nhập')}<br>
        Lịch học: ${formatDays(st)} · ${escapeHTML(st.schedTime || '--:--')} · ${st.duration || 1} ca
      </div>
      <div class="box">
        <strong>Tổng quan</strong><br>
        Ca đã học: ${formatNumber(slots)}<br>
        Ca nghỉ/cô bận: ${formatNumber(absentBusySlots)}
      </div>
      <h2>Nhận xét tổng hợp gửi phụ huynh</h2>
      ${summaryContent ? `<p>${escapeHTML(summaryContent)}</p>` : '<p>Chưa có nhận xét tổng hợp.</p>'}
      ${weekReports.length ? `<h2>Nhận xét tuần đã lưu</h2>${weekReports.map(r => `<div class="box"><strong>${escapeHTML(r.label || '')}</strong><p class="small">${escapeHTML(r.content || '')}</p></div>`).join('')}` : ''}
      <h2>Chi tiết ca học</h2>
      <table>
        <thead><tr><th>Ngày</th><th>Ca</th><th>Trạng thái</th><th>Nhận xét</th></tr></thead>
        <tbody>${sessions.map(s => `<tr>
          <td>${fmtDate(s.date)}</td><td>${escapeHTML(s.startTime || '--:--')} · ${s.duration || 1} ca</td><td>${statusLabel(s.status) || 'Chưa chấm'}</td>
          <td>${escapeHTML(sessionNoteText(s) || '')}</td>
        </tr>`).join('')}</tbody>
      </table>
    </body></html>`;

  const blob = new Blob(['\ufeff', html], { type: 'application/msword;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function actualSlots(session) {
  return Number(session?.actualSlots ?? session?.duration ?? 0);
}

function plannedSlots(session) {
  return Number(session?.plannedSlots ?? session?.debtSlots ?? session?.duration ?? 0);
}

function remainingMakeupSlots(studentId, sessions) {
  const sessionIds = new Set((sessions || []).map(s => s.id));
  return (Store.get('debts') || [])
    .filter(d => d.studentId === studentId && !d.done && (!d.sessionId || sessionIds.has(d.sessionId)))
    .reduce((total, d) => total + Number(d.slots || 0), 0);
}

function learnedSlotsToDate(sessions, st) {
  const today = todayStr();
  return sessions.filter(s =>
    s.studentId === st.id &&
    (s.status === 'taught' || s.status === 'partial' || s.status === 'makeup' || s.type === 'makeup') &&
    s.date <= today &&
    (!st.startDate || s.date >= st.startDate)
  ).reduce((sum, s) => sum + Number(s.actualSlots ?? s.duration ?? 0), 0);
}

function sessionsInRange(sessions, start, end) {
  return sessions
    .filter(s => s.date >= start && s.date <= end)
    .sort((a, b) => (a.date + (a.startTime || '')).localeCompare(b.date + (b.startTime || '')));
}

function getMonthRange(offset = 0) {
  const now = new Date();
  const base = new Date(now.getFullYear(), now.getMonth() + offset, 1);
  const end = new Date(base.getFullYear(), base.getMonth() + 1, 0);
  return {
    start: toDateStr(base),
    end: toDateStr(end),
    label: `Tháng ${base.getMonth() + 1}/${base.getFullYear()}`,
  };
}

function toDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatDays(st) {
  const rawDays = Array.from(new Set((st.schedDays || []).map(Number)))
    .filter(day => Number.isInteger(day) && day >= 0 && day <= 6);

  if (!rawDays.length) return 'Chưa có lịch';

  // Hiển thị lịch tuần theo thứ tự T2 → CN.
  // Nếu có từ 4 ngày học liên tiếp, rút gọn thành: ngày đầu → ngày cuối.
  const weekOrder = [1, 2, 3, 4, 5, 6, 0];
  const orderedDays = weekOrder.filter(day => rawDays.includes(day));
  const ranges = [];
  let current = [];

  orderedDays.forEach(day => {
    const prev = current[current.length - 1];
    const isNextDay = current.length
      ? weekOrder.indexOf(day) === weekOrder.indexOf(prev) + 1
      : true;

    if (!current.length || isNextDay) {
      current.push(day);
    } else {
      ranges.push(current);
      current = [day];
    }
  });

  if (current.length) ranges.push(current);

  return ranges
    .map(range => {
      if (range.length >= 4) {
        return `${DAYS_SHORT[range[0]]} → ${DAYS_SHORT[range[range.length - 1]]}`;
      }
      return range.map(day => DAYS_SHORT[day]).join(', ');
    })
    .join(', ');
}

function formatNumber(value) {
  return Number(value || 0).toLocaleString('vi-VN', { maximumFractionDigits: 1 });
}

function sum(list, key) { return list.reduce((a, item) => a + Number(item[key] || 0), 0); }
function safeFileName(name) { return name.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-zA-Z0-9._-]+/g, '-').replace(/-+/g, '-').toLowerCase(); }
function escapeHTML(value) { return String(value || '').replace(/[&<>\"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }

Store.subscribe('students', render);
Store.subscribe('sessions', render);
Store.subscribe('debts', render);
Store.subscribe('reports', render);
render();
</script>

</html>
