<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết học sinh — Nhật ký can thiệp</title>
<link rel="stylesheet" href="../shared/styles.css">
<link rel="stylesheet" href="../shared/components.css">
</head>
<body>
<div class="app-shell">
  <div data-component="sidebar" data-active="students"></div>

  <div class="main-content">
    <div data-component="topbar" data-title="Chi tiết học sinh"></div>
    <div class="page student-detail-page" id="pageStudentDetail"></div>
  </div>

  <div data-component="bottom-nav" data-active="students"></div>
  <div data-component="student-modal"></div>
</div>

<script src="../components/components-loader.js" type="module"></script>

<script type="module">
import {
  Store,
  avatarColor,
  initials,
  age,
  fmtDate,
  fmtDateShort,
  fmtMoney,
  statusLabel,
  getWeekRange,
  todayStr,
} from '../shared/store.js';

const DAYS_SHORT = ['CN','T2','T3','T4','T5','T6','T7'];
const page = document.getElementById('pageStudentDetail');
const params = new URLSearchParams(location.search);
let studentId = params.get('id');
let weekOffset = 0;
let monthOffset = 0;

function render() {
  const students = Store.get('students');
  const st = students.find(s => s.id === studentId) || students[0];
  if (!st) {
    page.innerHTML = `
      <div class="page-header">
        <div>
          <div class="page-title">Chi tiết học sinh</div>
          <div class="page-sub">Chưa có học sinh nào</div>
        </div>
        <a class="btn btn-outline btn-sm" href="students.html">← Quay lại</a>
      </div>`;
    return;
  }
  studentId = st.id;

  const sessions = Store.get('sessions').filter(s => s.studentId === st.id);
  const learnedToDate = learnedSlotsToDate(sessions, st);
  const debts = Store.get('debts').filter(d => d.studentId === st.id && !d.done);
  const week = getWeekRange(weekOffset);
  const month = getMonthRange(monthOffset);
  const weekSessions = sessionsInRange(sessions, week.start, week.end);
  const monthSessions = sessionsInRange(sessions, month.start, month.end);
  const weekReport = Store.getReport({ studentId: st.id, type: 'week', periodStart: week.start, periodEnd: week.end });
  const monthReport = Store.getReport({ studentId: st.id, type: 'month', periodStart: month.start, periodEnd: month.end });
  const weekReportsInMonth = reportsInRange(Store.get('reports') || [], st.id, 'week', month.start, month.end);

  page.innerHTML = `
    <div class="page-header student-detail-header">
      <div>
        <a class="back-link" href="students.html">← Học sinh</a>
        <div class="page-title">Chi tiết học sinh</div>
        <div class="page-sub">Nhận xét từng ca học, AI gợi ý nhận xét tuần/tháng và xuất Word gửi phụ huynh</div>
      </div>
      <button class="btn btn-outline btn-sm" id="btnEditStudent">Sửa thông tin</button>
    </div>

    <section class="student-profile-card">
      <div class="student-profile-main">
        <div class="avatar lg" style="background:${avatarColor(st.name)}">${initials(st.name)}</div>
        <div class="student-profile-info">
          <h1>${escapeHTML(st.name)}</h1>
          <div class="student-profile-tags">
            ${(st.difficulties || []).map(d => `<span class="tag">${escapeHTML(d)}</span>`).join('')}
            ${st.dob ? `<span class="tag green">${age(st.dob)}</span>` : ''}
            ${debts.length ? `<span class="tag red">Nợ ${sum(debts, 'slots')} ca</span>` : ''}
          </div>
          ${st.goal ? `<p><span class="emoji" aria-hidden="true">🎯</span>${escapeHTML(st.goal)}</p>` : ''}
        </div>
      </div>
      <div class="student-profile-grid">
        <div><span>Ngày bắt đầu học</span><strong>${st.startDate ? fmtDate(st.startDate) : 'Chưa nhập'}</strong></div>
        <div><span>Đã học đến hiện tại</span><strong>${formatNumber(learnedToDate)} ca</strong></div>
        <div><span>Giờ học</span><strong>${escapeHTML(st.schedTime || '--:--')}</strong></div>
        <div><span>Lịch tuần</span><strong>${formatDays(st)}</strong></div>
        <div><span>Độ dài</span><strong>${st.duration || 1} ca</strong></div>
        <div><span>Học phí</span><strong>${fmtMoney(st.feePerSlot)}/ca</strong></div>
        <div><span>Tên bố</span><strong>${escapeHTML(st.fatherName || 'Chưa nhập')}</strong></div>
        <div><span>Tên mẹ</span><strong>${escapeHTML(st.motherName || 'Chưa nhập')}</strong></div>
      </div>
    </section>

    <section class="detail-report-card">
      <div class="detail-section-head">
        <div>
          <div class="section-label">Nhận xét theo tuần</div>
          <h2>Tuần ${week.label}</h2>
        </div>
        <div class="detail-actions">
          <button class="icon-btn" data-action="prev-week" aria-label="Tuần trước">‹</button>
          <button class="icon-btn" data-action="next-week" aria-label="Tuần sau">›</button>
          <button class="btn btn-primary btn-sm" data-action="export-week"><span class="emoji" aria-hidden="true">📄</span> Xuất tuần</button>
        </div>
      </div>
      ${summaryTemplate({ st, sessions: weekSessions, report: weekReport, mode: 'week', label: `Tuần ${week.label}` })}
      ${sessionListTemplate(weekSessions)}
    </section>

    <section class="detail-report-card">
      <div class="detail-section-head">
        <div>
          <div class="section-label">Nhận xét theo tháng</div>
          <h2>${month.label}</h2>
        </div>
        <div class="detail-actions">
          <button class="icon-btn" data-action="prev-month" aria-label="Tháng trước">‹</button>
          <button class="icon-btn" data-action="next-month" aria-label="Tháng sau">›</button>
          <button class="btn btn-primary btn-sm" data-action="export-month"><span class="emoji" aria-hidden="true">📄</span> Xuất tháng</button>
        </div>
      </div>
      ${summaryTemplate({ st, sessions: monthSessions, report: monthReport, mode: 'month', label: month.label, weekReports: weekReportsInMonth })}
      ${weekReportListTemplate(weekReportsInMonth)}
    </section>
  `;

  bindEvents({ st, week, month, weekSessions, monthSessions, weekReport, monthReport, weekReportsInMonth });
}

function bindEvents(ctx) {
  const { st, week, month, weekSessions, monthSessions, weekReportsInMonth } = ctx;
  document.getElementById('btnEditStudent')?.addEventListener('click', () => window.StudentModal?.open(st.id));

  page.querySelector('[data-action="prev-week"]')?.addEventListener('click', () => { weekOffset -= 1; render(); });
  page.querySelector('[data-action="next-week"]')?.addEventListener('click', () => { weekOffset += 1; render(); });
  page.querySelector('[data-action="prev-month"]')?.addEventListener('click', () => { monthOffset -= 1; render(); });
  page.querySelector('[data-action="next-month"]')?.addEventListener('click', () => { monthOffset += 1; render(); });

  page.querySelector('[data-action="ai-week"]')?.addEventListener('click', () => {
    const text = generateWeekSummary(st, weekSessions, `Tuần ${week.label}`);
    page.querySelector('[data-report-content="week"]').value = text;
    page.querySelector('[data-report-content="week"]').focus();
  });
  page.querySelector('[data-action="ai-month"]')?.addEventListener('click', () => {
    const text = generateMonthSummary(st, monthSessions, weekReportsInMonth, month.label);
    page.querySelector('[data-report-content="month"]').value = text;
    page.querySelector('[data-report-content="month"]').focus();
  });
  page.querySelector('[data-action="save-week-report"]')?.addEventListener('click', () => {
    saveReport(st, 'week', week.start, week.end, `Tuần ${week.label}`, valueOfReport('week'));
  });
  page.querySelector('[data-action="save-month-report"]')?.addEventListener('click', () => {
    saveReport(st, 'month', month.start, month.end, month.label, valueOfReport('month'));
  });
  page.querySelector('[data-action="export-week"]')?.addEventListener('click', () => {
    const content = valueOfReport('week') || generateWeekSummary(st, weekSessions, `Tuần ${week.label}`);
    exportWordReport(st, weekSessions, `Tuần ${week.label}`, 'tuan', content);
  });
  page.querySelector('[data-action="export-month"]')?.addEventListener('click', () => {
    const content = valueOfReport('month') || generateMonthSummary(st, monthSessions, weekReportsInMonth, month.label);
    exportWordReport(st, monthSessions, month.label, 'thang', content, weekReportsInMonth);
  });
}

function summaryTemplate({ st, sessions, report, mode, label, weekReports = [] }) {
  const taught = sessions.filter(s => s.status === 'taught' || s.status === 'partial' || s.status === 'makeup' || s.type === 'makeup');
  const absent = sessions.filter(s => s.status === 'absent');
  const busy = sessions.filter(s => s.status === 'busy');
  const slots = taught.reduce((a, s) => a + actualSlots(s), 0);
  const absentSlots = absent.reduce((a, s) => a + plannedSlots(s), 0);
  const busySlots = busy.reduce((a, s) => a + plannedSlots(s), 0);
  const hasSource = mode === 'week' ? hasSessionNotes(sessions) : (weekReports.length || hasSessionNotes(sessions));
  const draft = report?.content || '';

  return `
    <div class="student-summary-grid">
      <div><strong>${formatNumber(slots)}</strong><span>Ca đã học</span></div>
      <div><strong>${formatNumber(absentSlots)}</strong><span>Ca bé nghỉ</span></div>
      <div><strong>${formatNumber(busySlots)}</strong><span>Ca cô bận</span></div>
      <div><strong>${formatNumber(absentSlots + busySlots)}</strong><span>Ca cần bù</span></div>
    </div>

    <div class="ai-summary-card">
      <div class="ai-summary-head">
        <div>
          <div class="summary-note-title"><span class="emoji" aria-hidden="true">✨</span> Nhận xét ${mode === 'week' ? 'tuần' : 'tháng'} gửi phụ huynh</div>
          <p>${mode === 'week'
            ? 'AI tạo bản nháp từ nhận xét từng ca học. Cô giáo nên kiểm tra và chỉnh sửa trước khi lưu/xuất.'
            : 'AI tạo bản nháp từ nhận xét tuần đã lưu. Nếu chưa có nhận xét tuần, hệ thống sẽ dùng nhận xét từng ca học trong tháng.'}</p>
        </div>
        <button class="btn btn-outline btn-sm" data-action="ai-${mode}" ${hasSource ? '' : 'disabled'}><span class="emoji" aria-hidden="true">🤖</span> AI tạo nhận xét</button>
      </div>
      <textarea class="ai-summary-textarea" data-report-content="${mode}" rows="7" placeholder="${hasSource ? 'Bấm AI tạo nhận xét hoặc tự nhập nội dung tổng hợp...' : 'Chưa có dữ liệu nhận xét để tổng hợp.'}">${escapeHTML(draft)}</textarea>
      <div class="ai-summary-actions">
        <span>${report ? `Đã lưu · ${escapeHTML(label)}` : 'Chưa lưu bản tổng hợp'}</span>
        <button class="btn btn-primary btn-sm" data-action="save-${mode}-report">Lưu nhận xét ${mode === 'week' ? 'tuần' : 'tháng'}</button>
      </div>
    </div>`;
}

function sessionListTemplate(sessions) {
  if (!sessions.length) {
    return `<div class="empty-detail-note">Chưa có ca học nào trong tuần này.</div>`;
  }
  return `
    <div class="session-note-list">
      ${sessions.map(s => `
        <article class="session-note-item">
          <div class="session-note-head">
            <div>
              <strong>${fmtDate(s.date)}</strong>
              <span>${escapeHTML(s.startTime || '--:--')} · ${s.duration || 1} ca · ${statusLabel(s.status) || 'Chưa chấm'}</span>
            </div>
            <span class="status-pill status-${s.status || 'pending'}">${statusLabel(s.status) || 'Chưa chấm'}</span>
          </div>
          <div class="session-note-grid">
            ${noteLine('🎯', 'Kỹ năng', s.noteSkill)}
            ${noteLine('⚡', 'Hành vi', s.noteBehavior)}
            ${noteLine('🌱', 'Tiến bộ', s.noteProgress)}
            ${noteLine('💌', 'Gửi phụ huynh', s.noteParent)}
          </div>
        </article>`).join('')}
    </div>`;
}

function weekReportListTemplate(reports) {
  if (!reports.length) {
    return `<div class="empty-detail-note">Chưa có nhận xét tuần đã lưu trong tháng này.</div>`;
  }
  return `
    <div class="week-report-list">
      <div class="section-label">Nguồn nhận xét tuần</div>
      ${reports.map(r => `
        <article class="week-report-item">
          <strong>${escapeHTML(r.label || 'Nhận xét tuần')}</strong>
          <p>${escapeHTML(r.content || '')}</p>
        </article>`).join('')}
    </div>`;
}

function noteLine(icon, label, value) {
  return `
    <div class="session-note-line">
      <span class="emoji" aria-hidden="true">${icon}</span>
      <div><small>${label}</small><p>${escapeHTML(value || 'Chưa nhập')}</p></div>
    </div>`;
}

function saveReport(st, type, start, end, label, content) {
  Store.upsertReport({
    studentId: st.id,
    type,
    periodStart: start,
    periodEnd: end,
    label,
    source: 'teacher-edited',
    content: content.trim(),
  });
}

function valueOfReport(mode) {
  return page.querySelector(`[data-report-content="${mode}"]`)?.value.trim() || '';
}

function generateWeekSummary(st, sessions, label) {
  const taught = sessions.filter(s => s.status === 'taught' || s.status === 'makeup');
  const notes = collectNotes(sessions);
  if (!hasSessionNotes(sessions)) return '';

  const parts = [];
  parts.push(`Trong ${label.toLowerCase()}, ${st.name} đã học tổng ${formatNumber(taught.reduce((a, s) => a + actualSlots(s), 0))} ca.`);
  if (notes.skill.length) parts.push(`Về kỹ năng tập trung, bé được ghi nhận: ${joinNotes(notes.skill)}.`);
  if (notes.progress.length) parts.push(`Điểm tiến bộ nổi bật trong tuần là: ${joinNotes(notes.progress)}.`);
  if (notes.behavior.length) parts.push(`Về hành vi trong ca học, cô ghi nhận: ${joinNotes(notes.behavior)}.`);
  if (notes.parent.length) parts.push(`Phần trao đổi với phụ huynh: ${joinNotes(notes.parent)}.`);
  parts.push(`Tuần tới, cô sẽ tiếp tục củng cố các kỹ năng đã tiến bộ, đồng thời hỗ trợ bé duy trì sự tập trung, hợp tác và diễn đạt nhu cầu phù hợp hơn trong từng hoạt động.`);
  return parts.join('\n\n');
}

function generateMonthSummary(st, sessions, weekReports, label) {
  const taught = sessions.filter(s => s.status === 'taught' || s.status === 'makeup');
  const sourceTexts = weekReports.map(r => r.content).filter(Boolean);
  const notes = collectNotes(sessions);
  const parts = [];
  parts.push(`Trong ${label.toLowerCase()}, ${st.name} đã học tổng ${formatNumber(taught.reduce((a, s) => a + actualSlots(s), 0))} ca.`);

  if (sourceTexts.length) {
    parts.push(`Dựa trên các nhận xét theo tuần, bé có sự thay đổi đáng chú ý qua từng giai đoạn: ${joinNotes(sourceTexts)}.`);
  } else {
    if (notes.skill.length) parts.push(`Về kỹ năng tập trung, các ghi nhận trong tháng gồm: ${joinNotes(notes.skill)}.`);
    if (notes.progress.length) parts.push(`Các tiến bộ nổi bật trong tháng gồm: ${joinNotes(notes.progress)}.`);
    if (notes.behavior.length) parts.push(`Về hành vi, cô ghi nhận: ${joinNotes(notes.behavior)}.`);
  }

  if (notes.parent.length) parts.push(`Một số nội dung cần phối hợp thêm với phụ huynh: ${joinNotes(notes.parent)}.`);
  parts.push(`Trong tháng tới, cô sẽ tiếp tục duy trì các điểm mạnh đã hình thành, tăng dần yêu cầu theo khả năng của bé và phối hợp với gia đình để hỗ trợ bé ổn định hơn trong học tập, giao tiếp và sinh hoạt.`);
  return parts.join('\n\n');
}

function collectNotes(sessions) {
  return {
    skill: uniqueNotes(sessions, 'noteSkill'),
    behavior: uniqueNotes(sessions, 'noteBehavior'),
    progress: uniqueNotes(sessions, 'noteProgress'),
    parent: uniqueNotes(sessions, 'noteParent'),
  };
}

function hasSessionNotes(sessions) {
  return sessions.some(s => s.noteSkill || s.noteBehavior || s.noteProgress || s.noteParent);
}

function uniqueNotes(sessions, key) {
  return [...new Set(sessions.map(s => String(s[key] || '').trim()).filter(Boolean))];
}

function joinNotes(items) {
  return items.map(t => t.replace(/[.。]+$/,'')).join('; ');
}

function reportsInRange(reports, studentId, type, start, end) {
  return reports
    .filter(r => r.studentId === studentId && r.type === type && r.periodStart >= start && r.periodStart <= end)
    .sort((a, b) => a.periodStart.localeCompare(b.periodStart));
}

function exportWordReport(st, sessions, label, scope, summaryContent = '', weekReports = []) {
  const taught = sessions.filter(s => s.status === 'taught' || s.status === 'partial' || s.status === 'makeup' || s.type === 'makeup');
  const slots = taught.reduce((a, s) => a + actualSlots(s), 0);
  const absentBusySlots = sessions
    .filter(s => s.status === 'absent' || s.status === 'busy')
    .reduce((a, s) => a + plannedSlots(s), 0);
  const fileName = safeFileName(`bao-cao-${scope}-${st.name}-${todayStr()}.doc`);

  const html = `
    <html><head><meta charset="UTF-8"><title>Báo cáo ${label}</title>
    <style>
      body{font-family:Arial,sans-serif;color:#111827;line-height:1.5}
      h1{font-size:22px;margin:0 0 6px} h2{font-size:16px;margin:20px 0 8px}
      .muted{color:#6b7280}.box{border:1px solid #e5e7eb;padding:12px;margin:12px 0;border-radius:8px}
      table{width:100%;border-collapse:collapse;margin-top:10px} th,td{border:1px solid #e5e7eb;padding:8px;text-align:left;vertical-align:top;font-size:12px}
      th{background:#f3f4f6} p{white-space:pre-line}.small{font-size:12px;color:#6b7280}
    </style></head><body>
      <h1>Báo cáo can thiệp — ${escapeHTML(st.name)}</h1>
      <div class="muted">${escapeHTML(label)} · Tạo ngày ${fmtDate(todayStr())}</div>
      <div class="box">
        <strong>Thông tin học sinh</strong><br>
        Tên bố: ${escapeHTML(st.fatherName || 'Chưa nhập')}<br>
        Tên mẹ: ${escapeHTML(st.motherName || 'Chưa nhập')}<br>
        Ngày bắt đầu học: ${st.startDate ? fmtDate(st.startDate) : 'Chưa nhập'}<br>
        Đã học đến hiện tại: ${formatNumber(learnedSlotsToDate(sessions, st))} ca<br>
        Mục tiêu: ${escapeHTML(st.goal || 'Chưa nhập')}<br>
        Lịch học: ${formatDays(st)} · ${escapeHTML(st.schedTime || '--:--')} · ${st.duration || 1} ca
      </div>
      <div class="box">
        <strong>Tổng quan</strong><br>
        Ca đã học: ${formatNumber(slots)}<br>
        Ca nghỉ/cô bận: ${formatNumber(absentBusySlots)}
      </div>
      <h2>Nhận xét tổng hợp gửi phụ huynh</h2>
      ${summaryContent ? `<p>${escapeHTML(summaryContent)}</p>` : '<p>Chưa có nhận xét tổng hợp.</p>'}
      ${weekReports.length ? `<h2>Nhận xét tuần đã lưu</h2>${weekReports.map(r => `<div class="box"><strong>${escapeHTML(r.label || '')}</strong><p class="small">${escapeHTML(r.content || '')}</p></div>`).join('')}` : ''}
      <h2>Chi tiết ca học</h2>
      <table>
        <thead><tr><th>Ngày</th><th>Ca</th><th>Trạng thái</th><th>Kỹ năng</th><th>Hành vi</th><th>Tiến bộ</th><th>Gửi phụ huynh</th></tr></thead>
        <tbody>${sessions.map(s => `<tr>
          <td>${fmtDate(s.date)}</td><td>${escapeHTML(s.startTime || '--:--')} · ${s.duration || 1} ca</td><td>${statusLabel(s.status) || 'Chưa chấm'}</td>
          <td>${escapeHTML(s.noteSkill || '')}</td><td>${escapeHTML(s.noteBehavior || '')}</td><td>${escapeHTML(s.noteProgress || '')}</td><td>${escapeHTML(s.noteParent || '')}</td>
        </tr>`).join('')}</tbody>
      </table>
    </body></html>`;

  const blob = new Blob(['\ufeff', html], { type: 'application/msword;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function actualSlots(session) {
  return Number(session?.actualSlots ?? session?.duration ?? 0);
}

function plannedSlots(session) {
  return Number(session?.plannedSlots ?? session?.debtSlots ?? session?.duration ?? 0);
}

function learnedSlotsToDate(sessions, st) {
  const today = todayStr();
  return sessions.filter(s =>
    s.studentId === st.id &&
    (s.status === 'taught' || s.status === 'partial' || s.status === 'makeup' || s.type === 'makeup') &&
    s.date <= today &&
    (!st.startDate || s.date >= st.startDate)
  ).reduce((sum, s) => sum + Number(s.actualSlots ?? s.duration ?? 0), 0);
}

function sessionsInRange(sessions, start, end) {
  return sessions
    .filter(s => s.date >= start && s.date <= end)
    .sort((a, b) => (a.date + (a.startTime || '')).localeCompare(b.date + (b.startTime || '')));
}

function getMonthRange(offset = 0) {
  const now = new Date();
  const base = new Date(now.getFullYear(), now.getMonth() + offset, 1);
  const end = new Date(base.getFullYear(), base.getMonth() + 1, 0);
  return {
    start: toDateStr(base),
    end: toDateStr(end),
    label: `Tháng ${base.getMonth() + 1}/${base.getFullYear()}`,
  };
}

function toDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatDays(st) {
  const days = (st.schedDays || []).sort((a, b) => a - b).map(d => DAYS_SHORT[d]).join(', ');
  return days || 'Chưa có lịch';
}

function formatNumber(value) {
  return Number(value || 0).toLocaleString('vi-VN', { maximumFractionDigits: 1 });
}

function sum(list, key) { return list.reduce((a, item) => a + Number(item[key] || 0), 0); }
function safeFileName(name) { return name.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-zA-Z0-9._-]+/g, '-').replace(/-+/g, '-').toLowerCase(); }
function escapeHTML(value) { return String(value || '').replace(/[&<>\"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
