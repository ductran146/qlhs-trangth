<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Học sinh — Nhật ký can thiệp</title>
<link rel="stylesheet" href="../shared/styles.css">
<link rel="stylesheet" href="../shared/components.css">
<style>

@media (max-width: 639px) {
  #pageStudents {
    background: var(--surface);
    padding: 16px;
    min-height: calc(100dvh - var(--nav-h) - 64px);
  }
}

.student-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 12px 12px;
  margin-bottom: 10px;
  display: flex; align-items: flex-start; gap: 12px;
  box-shadow: var(--sh); cursor: pointer;
  transition: box-shadow .2s;
}
.student-card:hover { box-shadow: var(--sh-md); transform: translateY(-1px); }
.student-card:focus-within { outline: 2px solid var(--violet-l); outline-offset: 2px; }
.student-body { flex: 1; min-width: 0; }
.student-name { font-size: 15px; font-weight: 600; line-height: 1.25; }
.student-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
.student-goal { font-size: 14px; color: var(--ink-2); margin-top: 16px; line-height: 1.35; }
.student-sched { font-size: 12px; color: var(--ink-3); margin-top: 5px; }
.student-actions { display: flex; gap: 6px; align-self: center; margin-left: 8px; }
.student-parent { font-size: 12px; color: var(--ink-2); margin-top: 5px; line-height: 1.4; }
.student-progress {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  margin-top: 6px;
  color: var(--ink-2);
  font-size: 12px;
  line-height: 1.4;
  font-weight: 600;
}
.student-progress span {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.debt-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.debt-item:last-child { border-bottom: none; }
.debt-info { flex: 1; }
.debt-name { font-size: 13px; font-weight: 600; }
.debt-meta { font-size: 12px; color: var(--ink-3); margin-top: 1px; }

/* student-toolbar styles moved to components.css */
.student-status-tabs {
  display: flex;
  gap: 8px;
  margin: 0 0 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.student-status-tabs::-webkit-scrollbar { display: none; }
.student-status-tab {
  height: 36px;
  padding: 0 14px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--surface);
  color: var(--ink-2);
  font-size: 14px;
  white-space: nowrap;
}
.student-status-tab.active {
  border-color: var(--violet, var(--primary));
  background: rgba(115, 91, 249, .10);
  color: var(--violet, var(--primary));
  font-weight: 700;
}
.student-empty-filter {
  padding: 28px 16px;
  text-align: center;
  color: var(--ink-3);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--sh);
}

/* Delete confirm dialog */
.delete-backdrop {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(16,16,19,.45);
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.delete-dialog {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 24px;
  max-width: 360px; width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
}
.delete-dialog-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(220,38,38,.1);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
  font-family: var(--emoji-font, 'TossFace', 'Apple Color Emoji', sans-serif);
}
.delete-dialog h3 { font-size: 17px; font-weight: 700; margin: 0 0 8px; }
.delete-dialog p  { font-size: 14px; color: var(--ink-2); margin: 0 0 20px; line-height: 1.5; }
.delete-dialog-actions { display: flex; gap: 10px; justify-content: flex-end; }

@media (max-width: 640px) {
  .student-search,
  .student-sort { height: 44px; font-size: 14px; }
  .student-status-tabs { margin-bottom: 12px; }
}

</style>
</head>
<body>
<div class="app-shell">

  <div data-component="sidebar" data-active="students"></div>

  <div class="main-content">
    <div data-component="topbar" data-title="Học sinh"></div>

    <div class="page" id="pageStudents"></div>
  </div>

  <div data-component="bottom-nav" data-active="students"></div>

  <!-- Student modal component -->
  <div data-component="student-modal"></div>
</div>

<script src="../components/components-loader.js" type="module"></script>

<script type="module">
import { Store, avatarColor, initials, age, fmtDate, fmtMoney, todayStr , displayName } from '../shared/store.js';

const DAYS_SHORT = ['CN','T2','T3','T4','T5','T6','T7'];
const page = document.getElementById('pageStudents');

const state = {
  query: '',
  sort: localStorage.getItem('nkct_students_sort') || 'start-desc',
  status: localStorage.getItem('nkct_students_status') || 'active',
};

function render() {
  const allStudents = Store.get('students').map(st => ({ ...st, status: st.status || 'active' }));
  const debts    = Store.get('debts').filter(d => !d.done);
  const sessions = Store.get('sessions');
  const activeCount = allStudents.filter(st => st.status !== 'inactive').length;
  const filteredStudents = getFilteredStudents(allStudents);

  let html = `
    <div class="page-header">
      <div>
        <div class="page-title">Học sinh</div>
        <div class="page-sub">${activeCount} học sinh đang can thiệp</div>
      </div>
      <button class="btn btn-primary btn-sm" id="btnAddStudent">+ Thêm</button>
    </div>

    <div class="student-toolbar">
      <div class="student-search-wrap">
        <span class="student-search-icon" aria-hidden="true">⌕</span>
        <input class="student-search" id="studentSearch" type="search"
          placeholder="Tìm tên học sinh" value="${escapeAttr(state.query)}" autocomplete="off">
      </div>
      <select class="student-sort" id="studentSort" aria-label="Sắp xếp học sinh">
        <option value="start-desc" ${state.sort === 'start-desc' ? 'selected' : ''}>Mới vào học trước</option>
        <option value="start-asc" ${state.sort === 'start-asc' ? 'selected' : ''}>Cũ vào học trước</option>
        <option value="name-asc" ${state.sort === 'name-asc' ? 'selected' : ''}>Tên A → Z</option>
      </select>
    </div>

    <div class="student-status-tabs" role="tablist" aria-label="Trạng thái học sinh">
      <button class="student-status-tab ${state.status === 'active' ? 'active' : ''}" data-status-filter="active" type="button">Đang học</button>
      <button class="student-status-tab ${state.status === 'inactive' ? 'active' : ''}" data-status-filter="inactive" type="button">Đã nghỉ</button>
      <button class="student-status-tab ${state.status === 'all' ? 'active' : ''}" data-status-filter="all" type="button">Tất cả</button>
    </div>`;

  if (!allStudents.length) {
    html += `
      <div class="empty-state">
        <div class="icon"><span class="empty-emoji emoji" aria-hidden="true">👦</span></div>
        <div class="title">Chưa có học sinh nào</div>
        <div class="sub">Bắt đầu bằng cách thêm học sinh đầu tiên</div>
      </div>`;
  }

  for (const st of filteredStudents) {
    const stDebts  = debts.filter(d => d.studentId === st.id);
    html += `
      <div class="student-card" data-student-id="${st.id}">
        <div class="avatar" style="background:${avatarColor(st.name)};align-self:flex-start">
          ${initials(st.name)}
        </div>
        <div class="student-body">
          <div class="student-name">
            ${displayName(st)}
            ${st.status === 'inactive' ? `<span class="tag" style="margin-left:6px">Đã nghỉ</span>` : ''}
            ${stDebts.length ? `<span class="tag red" style="margin-left:6px">Nợ ${stDebts.reduce((a,d)=>a+d.slots,0)} ca</span>` : ''}
          </div>
          <div class="student-tags">
            ${(st.difficulties || []).map(d => `<span class="tag">${d}</span>`).join('')}
            ${st.dob ? `<span class="tag green">${age(st.dob)}</span>` : ''}
          </div>
          ${st.goal ? `<div class="student-goal"><span class="emoji" aria-hidden="true">🎯</span>${st.goal}</div>` : ''}
        </div>
        <div class="student-actions">
          <button class="btn btn-outline btn-sm" data-edit="${st.id}">Sửa</button>
          <button class="btn btn-sm" style="color:var(--red-d,#dc2626);border-color:var(--red-l,#fecaca);background:transparent;" data-delete="${st.id}" data-delete-name="${escapeAttr(st.name)}">Xóa</button>
        </div>
      </div>`;
  }

  if (allStudents.length && !filteredStudents.length) {
    html += `<div class="student-empty-filter">Không tìm thấy học sinh phù hợp</div>`;
  }

  if (debts.length) {
    html += `
      <div class="mt-16">
        <div class="section-label">Ca cần bù (${debts.length})</div>
        <div class="card">
          <div class="card-body">
            ${debts.map(debt => {
              const st = allStudents.find(s => s.id === debt.studentId);
              return `
                <div class="debt-item">
                  <div class="debt-info">
                    <div class="debt-name">${st?.name || '—'}</div>
                    <div class="debt-meta">
                      ${fmtDate(debt.date)} · ${debt.slots} ca
                      · ${debt.reason === 'absent' ? 'Bé nghỉ' : 'Cô bận'}
                    </div>
                  </div>
                  <span class="tag red">Chưa bù</span>
                </div>`;
            }).join('')}
          </div>
        </div>
      </div>`;
  }

  page.innerHTML = html;

  // Bind filters
  document.getElementById('studentSearch')?.addEventListener('input', (event) => {
    const cursor = event.target.selectionStart ?? event.target.value.length;
    state.query = event.target.value;
    render();
    const input = document.getElementById('studentSearch');
    input?.focus({ preventScroll: true });
    input?.setSelectionRange?.(cursor, cursor);
  });

  document.getElementById('studentSort')?.addEventListener('change', (event) => {
    state.sort = event.target.value;
    localStorage.setItem('nkct_students_sort', state.sort);
    render();
  });

  page.querySelectorAll('[data-status-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.status = btn.dataset.statusFilter;
      localStorage.setItem('nkct_students_status', state.status);
      render();
    });
  });

  // Bind add button
  document.getElementById('btnAddStudent')?.addEventListener('click', () => {
    window.StudentModal?.open();
  });

  // Open detail when clicking a student card
  page.querySelectorAll('.student-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.studentId;
      if (id) location.href = `student-detail.html?id=${encodeURIComponent(id)}`;
    });
  });

  // Bind edit buttons
  page.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      window.StudentModal?.open(btn.dataset.edit);
    });
  });

  // Bind delete buttons
  page.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      confirmDeleteStudent(btn.dataset.delete, btn.dataset.deleteName);
    });
  });
}

Store.subscribe('students', render);
Store.subscribe('sessions', render);
Store.subscribe('debts', render);
render();


function confirmDeleteStudent(studentId, studentName) {
  // Xóa backdrop cũ nếu có
  document.querySelector('.delete-backdrop')?.remove();

  const backdrop = document.createElement('div');
  backdrop.className = 'delete-backdrop';
  backdrop.innerHTML = `
    <div class="delete-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteDialogTitle">
      <div class="delete-dialog-icon"><span class="emoji" style="font-size:22px;line-height:1;" aria-hidden="true">🗑️</span></div>
      <h3 id="deleteDialogTitle">Xóa học sinh?</h3>
      <p>Xóa <strong>${studentName}</strong> khỏi danh sách.<br>
      Lịch sử buổi học và <strong>thu nhập vẫn được giữ lại</strong>.<br>
      Thao tác này không thể hoàn tác.</p>
      <div class="delete-dialog-actions">
        <button class="btn btn-outline btn-sm" id="cancelDelete">Hủy</button>
        <button class="btn btn-sm" style="background:var(--red-d,#dc2626);color:#fff;border:none;" id="confirmDelete">Xóa học sinh</button>
      </div>
    </div>`;

  document.body.appendChild(backdrop);

  document.getElementById('cancelDelete').addEventListener('click', () => backdrop.remove());
  backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.remove(); });

  document.getElementById('confirmDelete').addEventListener('click', () => {
    deleteStudentKeepIncome(studentId);
    backdrop.remove();
  });
}

function deleteStudentKeepIncome(studentId) {
  // Bước 1: Snapshot feePerSlot của học sinh vào từng session
  // để income page vẫn tính được tiền dù student không còn
  const student = Store.get('students').find(s => s.id === studentId);
  const feePerSlot = student?.feePerSlot || 0;

  if (feePerSlot > 0) {
    const sessions = Store.get('sessions');
    const updated = sessions.map(s => {
      if (s.studentId !== studentId || s.feePerSlot != null) return s;
      return { ...s, feePerSlot };
    });
    Store.set('sessions', updated);
  }

  // Bước 2: Xóa debts của học sinh
  const debts = Store.get('debts').filter(d => d.studentId !== studentId);
  Store.set('debts', debts, { allowDeletes: true });

  // Bước 3: Xóa học sinh
  const students = Store.get('students').filter(s => s.id !== studentId);
  Store.set('students', students, { allowDeletes: true });
}

function getFilteredStudents(students) {
  const q = normalizeText(state.query);
  return students
    .filter(st => {
      const status = st.status || 'active';
      if (state.status !== 'all' && status !== state.status) return false;
      if (!q) return true;
      return normalizeText(st.name).includes(q);
    })
    .sort((a, b) => {
      if (state.sort === 'name-asc') {
        return String(a.name || '').localeCompare(String(b.name || ''), 'vi');
      }
      const av = a.startDate || '';
      const bv = b.startDate || '';
      if (state.sort === 'start-asc') return av.localeCompare(bv) || String(a.name || '').localeCompare(String(b.name || ''), 'vi');
      return bv.localeCompare(av) || String(a.name || '').localeCompare(String(b.name || ''), 'vi');
    });
}

function normalizeText(value) {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/đ/g, 'd')
    .replace(/Đ/g, 'D')
    .toLowerCase()
    .trim();
}

function escapeAttr(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function learnedSlotsToDate(sessions, st) {
  const today = todayStr();
  return sessions.filter(s =>
    s.studentId === st.id &&
    (s.status === 'taught' || s.status === 'partial' || s.status === 'makeup' || s.type === 'makeup') &&
    s.date <= today &&
    (!st.startDate || s.date >= st.startDate)
  ).reduce((sum, s) => sum + Number(s.actualSlots ?? s.duration ?? 0), 0);
}

function formatNumber(value) {
  return Number(value || 0).toLocaleString('vi-VN', { maximumFractionDigits: 1 });
}

function parentText(st) {
  const parts = [];
  if (st.fatherName) parts.push(`Bố: ${st.fatherName}`);
  if (st.motherName) parts.push(`Mẹ: ${st.motherName}`);
  return parts.join(' · ');
}
</script>
</body>
</html>
