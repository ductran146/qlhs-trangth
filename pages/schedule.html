<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Thời gian biểu — Nhật ký can thiệp</title>
<link rel="stylesheet" href="../shared/styles.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
/* ── Layout ───────────────────────────────────────────────────── */
#pageSchedule {
  padding: 0 16px;
  padding-bottom: 24px;
}

/* ── Day picker ───────────────────────────────────────────────── */
.sched-day-tabs-wrap {
  position: sticky;
  top: 64px; /* mobile: topbar fixed 64px */
  z-index: 30;
  background: var(--bg);
  padding: 20px 0 20px;
}

/* Tablet+ : topbar không fixed, top nhỏ hơn */
@media (min-width: 640px) {
  .sched-day-tabs-wrap {
    top: 0px;
    padding: 20px 0;
    margin-bottom: 0;
    border-bottom: none;
  }
}
.sched-day-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.sched-day-tabs::-webkit-scrollbar { display: none; }
.sched-day-tab {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 12px;
  border-radius: var(--r-lg);
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 11px;
  color: var(--ink-3);
  font-weight: 500;
  transition: all .15s;
  min-width: 44px;
}
.sched-day-tab .day-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.sched-day-tab .day-dot  { width: 5px; height: 5px; border-radius: 50%; background: transparent; margin-top: 2px; }
.sched-day-tab.has-class .day-dot { background: var(--violet); }
.sched-day-tab.active {
  background: var(--violet);
  border-color: var(--violet);
  color: #fff;
}
.sched-day-tab.active .day-name { color: #fff; }
.sched-day-tab.active .day-dot  { background: rgba(255,255,255,.6); }
.sched-day-tab.is-today:not(.active) { border-color: var(--violet); }

/* ── Timeline ─────────────────────────────────────────────────── */
.sched-timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
}

.sched-slot {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  min-height: 56px;
  position: relative;
}

/* giờ label */
.sched-time {
  width: 44px;
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-3);
  padding-top: 6px;
  text-align: right;
}

/* đường dọc */
.sched-line-col {
  width: 2px;
  flex-shrink: 0;
  position: relative;
  align-self: stretch;
}
.sched-line-col::before {
  content: '';
  position: absolute;
  top: 10px; bottom: 0; left: 0;
  width: 2px;
  background: var(--border);
}
.sched-line-col::after {
  content: '';
  position: absolute;
  top: 6px; left: -4px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--border);
  border: 2px solid var(--surface);
}
.sched-slot.busy .sched-line-col::after  { background: var(--violet); }
.sched-slot.free .sched-line-col::after  { background: var(--green); }
.sched-slot.partial .sched-line-col::after { background: var(--amber); }

/* card nội dung */
.sched-card {
  flex: 1;
  border-radius: var(--r-lg);
  padding: 10px 12px;
  margin-bottom: 8px;
  min-height: 44px;
}

/* Trống */
.sched-card.free {
  background: color-mix(in srgb, var(--green) 10%, transparent);
  border: 1px dashed var(--green);
}
.sched-card.free .sched-card-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--green-d);
}
.sched-card.free .sched-card-sub {
  font-size: 11px;
  color: var(--green-d);
  opacity: .7;
  margin-top: 2px;
}

/* Có học sinh */
.sched-card.busy {
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
}
.sched-card.busy .sched-student-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}
.sched-card.busy .sched-card-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sched-card.busy .sched-card-sub {
  font-size: 11px;
  color: var(--ink-3);
}

/* Khoảng trống ngắn (< 30p) */
.sched-card.gap {
  background: transparent;
  border: none;
  padding: 0 12px;
}
.sched-card.gap .sched-card-label {
  font-size: 11px;
  color: var(--ink-3);
  font-style: italic;
}

/* avatar mini */
.sched-avatar {
  display: inline-flex;
  width: 22px; height: 22px;
  border-radius: 50%;
  align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff;
  flex-shrink: 0;
  vertical-align: middle;
  margin-right: 6px;
}

/* ── Summary bar ──────────────────────────────────────────────── */
.sched-summary {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.sched-summary-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
}
.sched-summary-chip.busy-chip  { background: var(--violet-l); color: var(--violet-d); }
.sched-summary-chip.free-chip  { background: color-mix(in srgb, var(--green) 15%, transparent); color: var(--green-d); }
.sched-summary-chip .chip-dot  { width: 7px; height: 7px; border-radius: 50%; }
.busy-chip .chip-dot  { background: var(--violet); }
.free-chip .chip-dot  { background: var(--green); }

/* ── Empty state ──────────────────────────────────────────────── */
.sched-empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--ink-3);
  font-size: 14px;
}
.sched-empty .emoji { font-size: 32px; display: block; margin-bottom: 10px; }



/* ── Day content header: title stays outside sticky tabs ───────── */
.sched-day-content-head {
  position: relative;
  z-index: 1;
  background: var(--bg);
  margin: 0 0 16px;
  padding-top: 8px;
}

/* ── Current day title: keep visible on mobile ────────────────── */
.sched-current-day-title {
  display: block !important;
  visibility: visible !important;
  opacity: 1 !important;
  position: relative;
  z-index: 2;
  margin: 0 0 12px !important;
  padding: 0 !important;
  color: var(--ink) !important;
  font-size: 16px !important;
  line-height: 1.35 !important;
  font-weight: 700 !important;
  white-space: normal !important;
  overflow: visible !important;
  text-overflow: clip !important;
  max-height: none !important;
}

@media (max-width: 639px) {
  .sched-current-day-title {
    font-size: 18px !important;
  }
}

</style>
<meta name="theme-color" content="#735BF9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cô Trang">
<link rel="manifest" href="../manifest.webmanifest">
<link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
</head>
<body>
<div class="app-shell">

  <div data-component="sidebar" data-active="schedule"></div>

  <div class="main-content">
    <div data-component="topbar" data-title="Thời gian biểu"></div>
    <div class="page" id="pageSchedule"></div>
  </div>

</div>

<div data-component="bottom-nav" data-active="schedule"></div>

<script type="module">
import { Store, avatarColor, initials, displayName } from '../shared/store.js';
import '../shared/auth.js';

const WORK_START = 7;   // 7:00
const WORK_END   = 21;  // 21:00
const MIN_FREE   = 30;  // phút trống tối thiểu mới hiện "Có thể nhận"

const DAY_SHORT  = ['CN','T2','T3','T4','T5','T6','T7'];
const DAY_FULL   = ['Chủ nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'];

let selectedDow = new Date().getDay(); // 0=CN … 6=T7

const page = document.getElementById('pageSchedule');

/* ── helpers ──────────────────────────────────────────────────── */
function timeToMin(str = '') {
  const [h, m] = str.split(':').map(Number);
  return (h || 0) * 60 + (m || 0);
}
function minToTime(min) {
  const h = Math.floor(min / 60).toString().padStart(2, '0');
  const m = (min % 60).toString().padStart(2, '0');
  return `${h}:${m}`;
}
function slotDuration(st) {
  // duration = số ca; 1 ca = 60 phút, 0.5 ca = 30 phút
  return Math.round((st.duration || 1) * 60);
}

/* ── build slots cho 1 ngày trong tuần (dow 0–6) ─────────────── */
function buildDaySlots(dow) {
  const students = Store.get('students').filter(s =>
    s.status !== 'stopped' &&
    (s.schedDays || []).includes(dow)
  );

  // Sắp xếp theo giờ
  const classes = students
    .map(st => ({
      st,
      start: timeToMin(st.schedTime || '08:00'),
      end:   timeToMin(st.schedTime || '08:00') + slotDuration(st),
    }))
    .sort((a, b) => a.start - b.start);

  const result = [];
  // cursor bắt đầu từ ca đầu tiên — không hiện slot trống trước ca đầu
  let cursor = classes.length > 0 ? classes[0].start : WORK_START * 60;

  for (const cls of classes) {
    const gap = cls.start - cursor;
    if (gap >= MIN_FREE) {
      result.push({ type: 'free', start: cursor, end: cls.start, minutes: gap });
    } else if (gap > 0) {
      result.push({ type: 'gap', start: cursor, end: cls.start, minutes: gap });
    }
    result.push({ type: 'busy', start: cls.start, end: cls.end, student: cls.st });
    cursor = cls.end;
  }

  // Phần còn lại cuối ngày
  const tail = WORK_END * 60 - cursor;
  if (tail >= MIN_FREE) {
    result.push({ type: 'free', start: cursor, end: WORK_END * 60, minutes: tail });
  }

  return result;
}

/* ── render ───────────────────────────────────────────────────── */
function render() {
  const students = Store.get('students').filter(s => s.status !== 'stopped');
  const today = new Date().getDay();

  // ── Day tabs (T2–T7, CN) ─────────────────────────────────────
  const dowOrder = [1,2,3,4,5,6,0]; // T2 trước, CN sau
  const tabsHTML = dowOrder.map(dow => {
    const hasClass = students.some(s => (s.schedDays || []).includes(dow));
    const isToday  = dow === today;
    const isActive = dow === selectedDow;
    return `
      <button class="sched-day-tab${isActive ? ' active' : ''}${hasClass ? ' has-class' : ''}${isToday ? ' is-today' : ''}"
              data-dow="${dow}">
        <span class="day-name">${DAY_SHORT[dow]}</span>
        <span class="day-dot"></span>
      </button>`;
  }).join('');

  // ── Slots cho ngày được chọn ─────────────────────────────────
  const slots = buildDaySlots(selectedDow);
  const busyCount = slots.filter(s => s.type === 'busy').length;
  const freeSlots = slots.filter(s => s.type === 'free');
  const totalFreeMin = freeSlots.reduce((s, x) => s + x.minutes, 0);
  const freeHours = Math.floor(totalFreeMin / 60);
  const freeMin   = totalFreeMin % 60;
  const freeLabel = totalFreeMin === 0 ? 'Kín lịch' :
    freeHours > 0 ? `${freeHours}h${freeMin > 0 ? freeMin + 'p' : ''} trống` :
    `${freeMin}p trống`;

  const summaryHTML = `
    <div class="sched-summary">
      <div class="sched-summary-chip busy-chip">
        <span class="chip-dot"></span>${busyCount} ca học
      </div>
      <div class="sched-summary-chip free-chip">
        <span class="chip-dot"></span>${freeLabel}
      </div>
    </div>`;

  const timelineHTML = slots.length === 0
    ? `<div class="sched-empty">
        <span class="emoji nav-emoji">🗓️</span>
        Không có lịch học ngày ${DAY_FULL[selectedDow]}
      </div>`
    : `<div class="sched-timeline">
        ${slots.map(s => slotHTML(s)).join('')}
      </div>`;

  page.innerHTML = `
    <div class="sched-day-tabs-wrap">
      <div class="sched-day-tabs">${tabsHTML}</div>
    </div>
    <div class="sched-day-content-head">
      <h2 class="sched-current-day-title">${DAY_FULL[selectedDow]}</h2>
      ${summaryHTML}
    </div>
    ${timelineHTML}`;

  // Bind tab clicks
  page.querySelectorAll('.sched-day-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedDow = Number(btn.dataset.dow);
      render();
    });
  });
}

function slotHTML(s) {
  if (s.type === 'busy') {
    const st = s.student;
    const dur = slotDuration(st);
    const durLabel = dur >= 60 ? `${dur/60} ca · ${dur} phút` : `${dur} phút`;
    return `
      <div class="sched-slot busy">
        <div class="sched-time">${minToTime(s.start)}</div>
        <div class="sched-line-col"></div>
        <div class="sched-card busy">
          <span class="sched-avatar nav-emoji" style="background:${avatarColor(st.name)};flex-shrink:0">${initials(st.name)}</span>
          <div class="sched-student-info">
            <div class="sched-card-label">${escHTML(displayName(st))}</div>
            <div class="sched-card-sub">${minToTime(s.start)} – ${minToTime(s.end)} · ${durLabel}</div>
          </div>
        </div>
      </div>`;
  }

  if (s.type === 'free') {
    const h = Math.floor(s.minutes / 60);
    const m = s.minutes % 60;
    const dur = h > 0 ? `${h}h${m > 0 ? m + 'p' : ''}` : `${m} phút`;
    return `
      <div class="sched-slot free">
        <div class="sched-time">${minToTime(s.start)}</div>
        <div class="sched-line-col"></div>
        <div class="sched-card free">
          <div class="sched-card-label">Trống ${dur}</div>
          <div class="sched-card-sub">${minToTime(s.start)} – ${minToTime(s.end)} · Có thể nhận học sinh</div>
        </div>
      </div>`;
  }

  // gap nhỏ < 30p
  return `
    <div class="sched-slot partial">
      <div class="sched-time">${minToTime(s.start)}</div>
      <div class="sched-line-col"></div>
      <div class="sched-card gap">
        <div class="sched-card-label">Nghỉ ${s.minutes} phút</div>
      </div>
    </div>`;
}

function escHTML(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

Store.subscribe('students', render);
render();
</script>
<script src="../components/components-loader.js" type="module" defer></script>
<script src="../shared/pwa.js" defer></script>
</body>
</html>
