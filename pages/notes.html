<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nhật ký tuần — Nhật ký can thiệp</title>
<link rel="stylesheet" href="../shared/styles.css">
<link rel="stylesheet" href="../shared/components.css">
<meta name="theme-color" content="#735BF9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cô Trang">
<link rel="manifest" href="../manifest.webmanifest">
<link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
</head>
<body>
<div class="app-shell">

  <div data-component="sidebar" data-active="notes"></div>

  <div class="main-content">
    <div data-component="topbar" data-title="Nhật ký tuần"></div>

    <div class="page" id="pageNotes"></div>
  </div>

  <div data-component="bottom-nav" data-active="notes"></div>
</div>

<script src="../components/components-loader.js" type="module"></script>

<script type="module">
import { Store, avatarColor, initials, fmtMoney, getWeekRange } from '../shared/store.js';

const page = document.getElementById('pageNotes');
let weekOffset = 0;
let _search = '';
let _sort   = 'time-asc';
const expandedGroups = new Set();

function groupKey(studentId) {
  const week = getWeekRange(weekOffset);
  return `${studentId}-${week.start}`;
}

function render() {
  const week     = getWeekRange(weekOffset);
  const students = Store.get('students');
  const sessions = Store.get('sessions')
    .filter(s => s.date >= week.start && s.date <= week.end)
    .sort((a,b) => (a.date + a.startTime).localeCompare(b.date + b.startTime));

  // Render header 1 lần, tránh mất focus khi search
  if (!page.querySelector('.notes-header')) {
    page.innerHTML = `
      <div class="notes-header">
        <div class="student-toolbar" style="margin-bottom:12px">
          <div class="student-search-wrap">
            <span class="student-search-icon" aria-hidden="true">&#x2315;</span>
            <input class="student-search" id="notesSearch" type="search" placeholder="T&#236;m h&#7885;c sinh">
          </div>
          <select class="student-sort" id="notesSort">
            <option value="time-asc">Gi&#7901; h&#7885;c</option>
            <option value="name-asc">T&#234;n A &#8594; Z</option>
          </select>
        </div>
        <div class="week-nav">
          <button class="icon-btn" id="btnPrevWeek" aria-label="Tu&#7847;n tr&#432;&#7899;c"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <span class="week-lbl"></span>
          <button class="icon-btn" id="btnNextWeek" aria-label="Tu&#7847;n sau"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
      </div>
      <div class="notes-list-slot"></div>`;
    bindNav();
    bindSearchSort();
  }
  // Cập nhật week label
  const wlbl = page.querySelector('.week-lbl');
  if (wlbl) wlbl.textContent = `Tu\u1ea7n ${week.label}`;
  const sortEl = page.querySelector('#notesSort');
  if (sortEl) sortEl.value = _sort;

  let html = ``;

  if (!sessions.length) {
    html += `
      <div class="empty-state">
        <div class="icon"><span class="empty-emoji emoji" aria-hidden="true">📓</span></div>
        <div class="title">Chưa có buổi nào trong tuần này</div>
        <div class="sub">Vào Điểm danh để ghi nhận các buổi học</div>
      </div>`;
  page.querySelector('.notes-list-slot').innerHTML = html;
    return;
  }

  // Build byStudent rồi filter/sort
  const byStudentMap = {};
  for (const sess of sessions) {
    const st = students.find(s => s.id === sess.studentId);
    if (!st) continue;
    if (!byStudentMap[st.id]) byStudentMap[st.id] = { student: st, sessions: [] };
    byStudentMap[st.id].sessions.push(sess);
  }
  const q = _search.toLowerCase();
  let byStudentArr = Object.values(byStudentMap).filter(({ student: st }) =>
    !q || st.name?.toLowerCase().includes(q) || st.nickname?.toLowerCase().includes(q)
  );
  if (_sort === 'name-asc') {
    byStudentArr.sort((a, b) => a.student.name.localeCompare(b.student.name, 'vi'));
  } else {
    byStudentArr.sort((a, b) =>
      (a.student.schedTime || '00:00').localeCompare(b.student.schedTime || '00:00')
    );
  }
  const byStudent = byStudentArr;

  html += `<div class="notes-student-groups">`;

  byStudent.forEach(({ student: st, sessions: ss }, index) => {
    const key = groupKey(st.id);
    const isOpen = expandedGroups.size ? expandedGroups.has(key) : index === 0;
    if (!expandedGroups.size && index === 0) expandedGroups.add(key);

    const taughtCount = ss.filter(s => s.status === 'taught').length;
    const totalSlots = ss.reduce((a, s) => a + (Number(s.duration) || 0), 0);
    const income = ss
      .filter(s => s.status === 'taught')
      .reduce((a, s) => a + (Number(s.duration) || 0) * (st.feePerSlot || 0), 0);

    html += `
      <section class="notes-student-group ${isOpen ? 'is-open' : ''}" data-group-key="${key}">
        <button class="notes-student-head" type="button" aria-expanded="${isOpen}">
          <div class="avatar sm" style="background:${avatarColor(st.name)}">${initials(st.name)}</div>
          <div class="notes-student-main">
            <div class="notes-student-name">${st.name}</div>
            <div class="notes-student-meta">${taughtCount}/${ss.length} buổi đã học · ${totalSlots.toLocaleString('vi-VN')} ca · ${fmtMoney(income)}</div>
          </div>
          <div class="notes-student-summary" aria-hidden="true">
            <span class="notes-student-count">${ss.length} buổi</span>
            <span class="notes-student-arrow">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false" aria-hidden="true">
                <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
        </button>
        <div class="notes-student-body" ${isOpen ? '' : 'hidden'}>`;

    for (const sess of ss) {
      html += `<div data-component="session-card" data-session-id="${sess.id}" data-hide-name="true"></div>`;
    }

    html += `
        </div>
      </section>`;
  });

  html += `</div>`;

  page.querySelector('.notes-list-slot').innerHTML = html;
  bindGroups();
  loadSessionCards();
}

function bindNav() {
  document.getElementById('btnPrevWeek')?.addEventListener('click', () => {
    weekOffset--;
    expandedGroups.clear();
    render();
  });
  document.getElementById('btnNextWeek')?.addEventListener('click', () => {
    weekOffset++;
    expandedGroups.clear();
    render();
  });
}

function bindGroups() {
  page.querySelectorAll('.notes-student-group').forEach(group => {
    const head = group.querySelector('.notes-student-head');
    const body = group.querySelector('.notes-student-body');
    const key = group.dataset.groupKey;

    head?.addEventListener('click', () => {
      const willOpen = body.hasAttribute('hidden');
      body.toggleAttribute('hidden', !willOpen);
      group.classList.toggle('is-open', willOpen);
      head.setAttribute('aria-expanded', String(willOpen));

      if (willOpen) expandedGroups.add(key);
      else expandedGroups.delete(key);

      if (willOpen) loadSessionCards(group);
    });
  });
}

async function loadSessionCards(scope = document) {
  const { render: renderCard } = await import('../components/session-card.js');
  scope.querySelectorAll('[data-component="session-card"]').forEach(el => {
    if (el.dataset.rendered === 'true') return;
    renderCard(el, { ...el.dataset });
    el.dataset.rendered = 'true';
  });
}

window.exportWeek = () => {
  const week     = getWeekRange(weekOffset);
  const students = Store.get('students');
  const sessions = Store.get('sessions')
    .filter(s => s.date >= week.start && s.date <= week.end && s.status === 'taught')
    .sort((a,b) => (a.date + a.startTime).localeCompare(b.date + b.startTime));

  const byStudentMap = {};
  for (const sess of sessions) {
    const st = students.find(s => s.id === sess.studentId);
    if (!st) continue;
    if (!byStudentMap[st.id]) byStudentMap[st.id] = { student: st, sessions: [] };
    byStudentMap[st.id].sessions.push(sess);
  }

  const exportData = {
    weekLabel: `Tuần ${week.label}`,
    weekStart: week.start,
    weekEnd: week.end,
    generatedAt: new Date().toLocaleString('vi-VN'),
    students: Object.values(byStudentMap)
  };

  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `bao-cao-${week.start}.json`;
  a.click();
  URL.revokeObjectURL(url);
  alert(`Đã tải file bao-cao-${week.start}.json\nChạy: node export-word.js bao-cao-${week.start}.json`);
};

function bindSearchSort() {
  document.getElementById('notesSearch')?.addEventListener('input', e => {
    _search = e.target.value;
    render();
  });
  document.getElementById('notesSort')?.addEventListener('change', e => {
    _sort = e.target.value;
    render();
  });
}

Store.subscribe('students', render);
Store.subscribe('sessions', render);
Store.subscribe('debts', render);
Store.subscribe('*', render);
render();
</script>

<script src="../shared/pwa.js" defer></script>
</body>
</html>
